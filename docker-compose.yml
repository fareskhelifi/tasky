services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: npm run dev
    env_file:
      - backend/.env
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
    volumes:
      - ./backend/app.js:/app/backend/app.js
      - ./backend/src:/app/backend/src
      - ./backend/grammar:/app/backend/grammar
      - ./backend/scripts:/app/backend/scripts
      - ./frontend:/app/frontend
